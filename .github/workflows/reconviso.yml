name: Recon and OSINT from Main Domain

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Domain'
        required: true
        type: string
      scope:
        description: 'Scope (ex: *.example.com,example.com)'
        required: false
        default: ''
      stealth_level:
        description: 'Stealth Level'
        required: false
        type: choice
        options:
          - ultra
          - low
          - normal
        default: low
      nuclei_severities:
        description: 'Nuclei Severities (comma-separated)'
        required: false
        default: 'info,low,medium,high,critical'
        type: string
      scan_mode:
        description: 'Scan Mode (Noise Filter)'
        required: true
        type: choice
        options:
          - 'Discovery (Rápido: Apenas arquivos expostos e configs)'
          - 'Targeted (Inteligente: Adapta os testes à tecnologia do alvo)'
          - 'Full-Aggressive (Lento: Roda todos os milhares de templates)'
        default: Targeted
      max_targets:
        description: 'Max Subdomains to Scan (Limit to avoid long runs)'
        required: false
        default: '1000'
        type: string

env:
  SCAN_ID: ${{ github.run_id }}

jobs:
  setup:
    name: Setup & Stealth Config
    runs-on: ubuntu-latest
    outputs:
      domain: ${{ steps.extract.outputs.domain }}
      scope: ${{ steps.extract.outputs.scope }}
      max_rate: ${{ steps.stealth.outputs.max_rate }}
    steps:
      - name: Extract Domain & Scope
        id: extract
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.target }}" | sed 's|https\?://||' | sed 's|/.*||' | head -1)
          if [ -z "${{ github.event.inputs.scope }}" ]; then
            SCOPE="*.${DOMAIN},${DOMAIN}"
          else
            SCOPE="${{ github.event.inputs.scope }}"
          fi
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT

      - name: Calculate Stealth Rate
        id: stealth
        run: |
          LEVEL="${{ github.event.inputs.stealth_level || 'low' }}"
          case $LEVEL in
            ultra) MAX_RATE=3;;
            low) MAX_RATE=5;;
            normal) MAX_RATE=15;;
            *) MAX_RATE=5;;
          esac
          echo "max_rate=$MAX_RATE" >> $GITHUB_OUTPUT

  # 1. RECONHECIMENTO PASSIVO
  passive-recon:
    name: Passive - ${{ matrix.type }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        type: [subdomains, urls, dns, certs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Passive Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install github.com/lc/gau/v2/cmd/gau@latest
          go install github.com/tomnomnom/waybackurls@latest
          go install github.com/tomnomnom/unfurl@latest
          go install github.com/tomnomnom/anew@latest
          go install github.com/glebarez/cero@latest

      - name: Passive Recon
        run: |
          mkdir -p output/passive
          DOMAIN="${{ needs.setup.outputs.domain }}"
          
          case "${{ matrix.type }}" in
            "subdomains")
              subfinder -d $DOMAIN -silent -t 50 -o output/passive/subdomains.txt || true
              curl -s "https://crt.sh/?q=%25.$DOMAIN&output=json" | jq -r '.[].name_value' | sed 's/\*\.//g' > output/passive/crtsh.txt || true
              cat output/passive/subfinder.txt output/passive/crtsh.txt | grep -v '@' | sort -u > output/passive/subdomains.txt
              echo $DOMAIN >> output/passive/subdomains.txt
              sort -u output/passive/subdomains.txt -o output/passive/subdomains.txt
              ;;
            "urls")
              gau --threads 5 --subs $DOMAIN > output/passive/urls.txt || true
              echo $DOMAIN | waybackurls >> output/passive/urls.txt || true
              cat output/passive/urls.txt | sort -u | \
                grep -E '\.(txt|xml|json|bak|old|backup|config|env)' > output/passive/urls_juicy.txt || true
              cat output/passive/urls.txt | unfurl paths | sort -u > output/passive/paths.txt || true
              cat output/passive/urls.txt | unfurl keys | sort -u > output/passive/params.txt || true
              ;;
            "dns")
              echo $DOMAIN | dnsx -silent -json -o output/passive/dns.json || true
              jq -r '.host' output/passive/dns.json | sort -u > output/passive/all-hosts.txt || true
              ;;
            "certs")
              cero $DOMAIN > output/passive/certs.txt || true
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: passive-${{ matrix.type }}
          path: output/passive/

  # 2. RECONHECIMENTO ATIVO
  stealth-active:
    name: Stealth Active
    runs-on: ubuntu-latest
    needs: [setup, passive-recon]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install httpx
        run: go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - uses: actions/download-artifact@v4
        with:
          name: passive-subdomains
          path: passive-subdomains/

      - name: Stealth HTTP Probing
        env:
          MAX_RATE: ${{ needs.setup.outputs.max_rate }}
          THREADS: 10
          TIMEOUT: 5
          DELAY: 1
          MAX_TARGETS: ${{ github.event.inputs.max_targets || '1000' }}
        run: |
          mkdir -p output/active
          head -n $MAX_TARGETS passive-subdomains/subdomains.txt | httpx \
            -silent \
            -threads $THREADS \
            -rate-limit $MAX_RATE \
            -timeout $TIMEOUT \
            -delay $DELAY \
            -p 80,443,8080,8443 \
            -sc -title \
            -json -o output/active/live.json

      - uses: actions/upload-artifact@v4
        with:
          name: stealth-active
          path: output/active/

  # 3. STEALTH VULN SCAN
  stealth-vuln:
    name: Stealth Vuln Scan
    runs-on: ubuntu-latest
    needs: [stealth-active, passive-recon, setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cache Nuclei Templates
        uses: actions/cache@v4
        with:
          path: /home/runner/nuclei-templates
          key: ${{ runner.os }}-nuclei-templates-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nuclei-templates-

      - name: Setup Nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates

      - uses: actions/download-artifact@v4
        with:
          name: stealth-active
          path: stealth-active/

      - uses: actions/download-artifact@v4
        with:
          name: passive-subdomains
          path: passive-subdomains/

      - name: Stealth Nuclei
        env:
          MAX_RATE: ${{ needs.setup.outputs.max_rate }}
          THREADS: 10
          TIMEOUT: 3
          SEVERITIES: ${{ github.event.inputs.nuclei_severities || 'info,low,medium,high,critical' }}
          MODE: ${{ github.event.inputs.scan_mode }}
        run: |
          mkdir -p output/vuln
          cat passive-subdomains/subdomains.txt > targets.txt
          cat stealth-active/live.json | jq -r '.url' >> targets.txt 2>/dev/null || true
          sort -u targets.txt -o targets.txt
          
          if [[ "$MODE" == *"Discovery"* ]]; then
            echo "Rodando modo Discovery (Apenas Exposições)..."
            nuclei -l targets.txt \
              -tags exposure,config \
              -severity $SEVERITIES \
              -c $THREADS \
              -rl $MAX_RATE \
              -timeout $TIMEOUT \
              -retries 0 \
              -mhe 15 \
              -silent \
              -jsonl -o output/vuln/nuclei.jsonl
          
          elif [[ "$MODE" == *"Targeted"* ]]; then
            echo "Rodando modo Targeted (Automatic Technology Scan)..."
            nuclei -l targets.txt \
              -as \
              -severity $SEVERITIES \
              -c $THREADS \
              -rl $MAX_RATE \
              -timeout $TIMEOUT \
              -retries 0 \
              -mhe 15 \
              -silent \
              -jsonl -o output/vuln/nuclei.jsonl

          else
            echo "Rodando modo Full-Aggressive (Vai demorar!)..."
            nuclei -l targets.txt \
              -tags misconfiguration,http-headers,cve,file,exposure \
              -severity $SEVERITIES \
              -c $THREADS \
              -rl $MAX_RATE \
              -timeout $TIMEOUT \
              -retries 0 \
              -mhe 15 \
              -silent \
              -jsonl -o output/vuln/nuclei.jsonl
          fi
            
      - uses: actions/upload-artifact@v4
        with:
          name: stealth-vuln
          path: output/vuln/

  # 4. RELATÓRIO FINAL
  stealth-report:
    name: Final Report
    runs-on: ubuntu-latest
    needs: [stealth-vuln, passive-recon, stealth-active, setup]
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: true

      - name: Generate Report
        env:
          DOMAIN: ${{ needs.setup.outputs.domain }}
          STEALTH_LEVEL: ${{ github.event.inputs.stealth_level }}
          MAX_RATE: ${{ needs.setup.outputs.max_rate }}
          SCAN_ID: ${{ github.run_id }}
        run: |
          mkdir -p stealth-report
          printf "# 🥷 STEALTH RECON REPORT\n**Target:** %s\n**Stealth:** %s\n**Max Rate:** %s req/s\n**Scan ID:** %s\n\n## 📊 SUMMARY\n" \
            "$DOMAIN" "$STEALTH_LEVEL" "$MAX_RATE" "$SCAN_ID" > stealth-report/STEALTH-RECON.md
          
          SUBS=$(cat results/subdomains.txt 2>/dev/null | wc -l 2>/dev/null || echo 0)
          LIVE=$(cat results/live.json 2>/dev/null | wc -l 2>/dev/null || echo 0)
          VULN=$(cat results/nuclei.jsonl 2>/dev/null | wc -l 2>/dev/null || echo 0)
          
          cat >> stealth-report/STEALTH-RECON.md << TABLE_EOF
          | Metric | Count |
          | :--- | :--- |
          | 🌐 Subdomains Found | $SUBS |
          | 🟢 Live Hosts | $LIVE |
          | 🚨 Vulnerabilities | $VULN |
          TABLE_EOF

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: Final-Stealth-Report
          path: stealth-report/
